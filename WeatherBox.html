<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weather Box</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a0a25;
            background-image: linear-gradient(135deg, #3b0a45 0%, #222269 25%, #154360 50%, #1a1a45 75%, #0a0a25 100%);
            color: rgb(251, 251, 251);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.5s ease, color 0.5s ease;
            background-size: 400% 400%;
            animation: drift 5s ease infinite;
        }

        .weather-box {
            background: linear-gradient(135deg, #222269, #111136);
            padding: 20px;
            /*padding-bottom: 120px;*/
            border-radius: 10px;
            width: 350px;
            text-align: center;
            transition: background 0.5s ease, box-shadow 0.5s ease, color 0.5s ease;
            background-size: 200% 200%;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Weather condition animations */
        @keyframes drift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes rain-fall {
            0% { background-position: 0 0; }
            100% { background-position: 0 500px; }
        }
        
        @keyframes snow-fall {
            0% { background-position: 0 0; }
            100% { background-position: 50px 500px; }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        @keyframes fog-move {
            0% { background-position: 0 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes lightning-strike {
            0%, 1.9% { opacity: 0; transform: translateX(0) rotate(0) scaleY(0); }
            
            /* Strike 1 (Left Edge) */
            2% { opacity: 1; transform: translateX(-38%) rotate(12deg) scaleY(0); }
            5% { opacity: 1; transform: translateX(-38%) rotate(12deg) scaleY(1); }
            7% { opacity: 0; transform: translateX(-38%) rotate(12deg) scaleY(1); }
            
            24.9% { opacity: 0; transform: translateX(38%) rotate(-12deg) scaleY(0); }
            /* Strike 2 (Right Edge) */
            25% { opacity: 1; transform: translateX(38%) rotate(-12deg) scaleY(0); }
            28% { opacity: 1; transform: translateX(38%) rotate(-12deg) scaleY(1); }
            30% { opacity: 0; transform: translateX(38%) rotate(-12deg) scaleY(1); }

            54.9% { opacity: 0; transform: translateX(-15%) rotate(25deg) scaleY(0); }
            /* Strike 3 (Diagonal) */
            55% { opacity: 1; transform: translateX(-15%) rotate(25deg) scaleY(0); }
            57% { opacity: 1; transform: translateX(-15%) rotate(25deg) scaleY(1); }
            59% { opacity: 0; transform: translateX(-15%) rotate(25deg) scaleY(1); }
            60% { opacity: 1; transform: translateX(-15%) rotate(25deg) scaleY(1); }
            62% { opacity: 0; transform: translateX(-15%) rotate(25deg) scaleY(1); }
            
            100% { opacity: 0; transform: translateX(0) rotate(0) scaleY(0); }
        }

        @keyframes moveclouds {
            0% { transform: translateX(350px); }
            100% { transform: translateX(-200px); }
        }

        /* Clouds Setup */
        .weather-box > .clouds-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 1;
            pointer-events: none;
        }

        .weather-box.partly-cloudy-day .clouds-container,
        .weather-box.partly-cloudy-night .clouds-container,
        .weather-box.cloudy-day .clouds-container,
        .weather-box.cloudy-night .clouds-container {
            display: block;
        }

        /* Realistic Image Cloud Styling */
        .cloud {
            width: 250px; height: 100px;
            position: relative;
            background-image: url('https://3takphkjlgou51jr.private.blob.vercel-storage.com/clouds_3.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .cloud-wrapper {
            position: absolute;
            will-change: transform;
        }

        .weather-box > * {
            position: relative;
            z-index: 2;
        }

        /* Clear Day */
        .weather-box.clear-day, body.clear-day { background: linear-gradient(135deg, #739bf8, #aac8f0); color: #fff; animation: drift 2s ease infinite; }
        
        /* Clear Night */
        .weather-box.clear-night, body.clear-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }
        .weather-box.clear-night::before, .weather-box.clear-night::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 30%;
            z-index: 1; pointer-events: none;
        }
        .weather-box.clear-night::before {
            background-image: 
                radial-gradient(1.5px 1.5px at 10% 15%, #fdf182, transparent),
                radial-gradient(1px 1px at 25% 45%, #ffffff, transparent),
                radial-gradient(2px 2px at 45% 10%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 65% 60%, #fdf182, transparent),
                radial-gradient(1px 1px at 85% 30%, #ffffff, transparent),
                radial-gradient(2px 2px at 15% 80%, #ffffff, transparent),
                radial-gradient(1px 1px at 55% 85%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 90% 75%, #fdf182, transparent),
                radial-gradient(2px 2px at 35% 95%, #ffffff, transparent),
                radial-gradient(1px 1px at 75% 5%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 50% 50%, #ffffff, transparent),
                radial-gradient(1px 1px at 80% 45%, #fdf182, transparent),
                radial-gradient(2px 2px at 12% 40%, #ffffff, transparent),
                radial-gradient(1px 1px at 95% 10%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 30% 10%, #ffffff, transparent);
            background-size: 100% 100%;
            animation: twinkle 5s infinite ease-in-out;
        }
        .weather-box.clear-night::after {
            background-image:
                radial-gradient(1px 1px at 20% 70%, #fdf182, transparent),
                radial-gradient(2px 2px at 35% 25%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 55% 40%, #ffffff, transparent),
                radial-gradient(1px 1px at 75% 15%, #ffffff, transparent),
                radial-gradient(2px 2px at 95% 55%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 5% 35%, #ffffff, transparent),
                radial-gradient(1px 1px at 30% 90%, #fdf182, transparent),
                radial-gradient(2px 2px at 80% 90%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 45% 75%, #ffffff, transparent),
                radial-gradient(1px 1px at 65% 25%, #ffffff, transparent),
                radial-gradient(2px 2px at 85% 65%, #ffffff, transparent),
                radial-gradient(1px 1px at 15% 55%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 40% 15%, #ffffff, transparent),
                radial-gradient(1px 1px at 60% 80%, #fdf182, transparent),
                radial-gradient(2px 2px at 70% 40%, #ffffff, transparent);
            background-size: 100% 100%;
            animation: twinkle 3s infinite ease-in-out 0.5s;
        }

        /* Partly Cloudy Day */
        .weather-box.partly-cloudy-day, body.partly-cloudy-day { background: linear-gradient(135deg, #9f9ffa, #116bd2); color: #fff; animation: drift 15s ease infinite; }
        
        /* Night Mode Clouds */
        .weather-box.partly-cloudy-night .cloud,
        .weather-box.cloudy-night .cloud {
            filter: brightness(0.4);
        }

        /* Cloud Positions & Animation */
        .cloud-wrapper.x1 { top: 10px; animation: moveclouds 30s linear infinite; }
        .cloud-wrapper.x1 .cloud { transform: scale(1.2); opacity: 0.95; }
        .cloud-wrapper.x2 { top: 50px; animation: moveclouds 30s linear infinite; animation-delay: -5s; }
        .cloud-wrapper.x2 .cloud { transform: scale(0.4); opacity: 0.6; }
        .cloud-wrapper.x3 { top: 20px; animation: moveclouds 30s linear infinite; animation-delay: -10s; }
        .cloud-wrapper.x3 .cloud { transform: scale(0.75); opacity: 0.8; }
        .cloud-wrapper.x4 { top: 70px; animation: moveclouds 30s linear infinite; animation-delay: -15s; }
        .cloud-wrapper.x4 .cloud { transform: scale(0.3); opacity: 0.5; }
        .cloud-wrapper.x5 { top: 35px; animation: moveclouds 30s linear infinite; animation-delay: -20s; }
        .cloud-wrapper.x5 .cloud { transform: scale(0.9); opacity: 0.85; }

        /* Partly Cloudy Night */
        .weather-box.partly-cloudy-night, body.partly-cloudy-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }

        /* Cloudy Day */
        .weather-box.cloudy-day, body.cloudy-day { background: linear-gradient(135deg, #5d6e6f, #adaeaf); color: #fff; }
        
        /* Cloudy Night */
        .weather-box.cloudy-night, body.cloudy-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }

        /* Rain Day */
        .weather-box.rain-day, body.rain-day { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #fff; }
        
        /* Rain Night */
        .weather-box.rain-night, body.rain-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }
        .weather-box.rain-day::before, .weather-box.rain-night::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(1px 20px at 10% 20%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1.5px 25px at 30% 60%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 15px at 50% 10%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 30px at 70% 80%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 20px at 90% 40%, rgba(255,255,255,0.8), transparent);
            background-size: 100px 100px;
            transform: rotate(15deg);
            animation: rain-fall 1.5s linear infinite;
            z-index: 1; pointer-events: none;
        }

        /* Drizzle Day */
        .weather-box.drizzle-day, body.drizzle-day { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #fff; }
        
        /* Drizzle Night */
        .weather-box.drizzle-night, body.drizzle-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }
        .weather-box.drizzle-day::before, .weather-box.drizzle-night::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(1px 10px at 20% 30%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 12px at 50% 70%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 8px at 80% 20%, rgba(255,255,255,0.6), transparent);
            background-size: 120px 120px;
            transform: rotate(10deg);
            animation: rain-fall 3s linear infinite;
            z-index: 1; pointer-events: none;
        }

        /* Thunderstorm Day */
        .weather-box.thunderstorm-day { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #fff; }
        body.thunderstorm-day { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #fff; }
        
        /* Thunderstorm Night */
        .weather-box.thunderstorm-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }
        body.thunderstorm-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }
        .weather-box.thunderstorm-day::before, .weather-box.thunderstorm-night::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(1.5px 25px at 10% 20%, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 30px at 30% 60%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1.5px 20px at 50% 10%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2.5px 35px at 70% 80%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 25px at 90% 40%, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 20px at 20% 80%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 30px at 80% 30%, rgba(255,255,255,0.8), transparent);
            background-size: 80px 80px;
            transform: rotate(20deg);
            animation: rain-fall 3s linear infinite;
            z-index: 1; pointer-events: none;
        }

        /* Hailstorm Day */
        .weather-box.hail-day, body.hail-day { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #fff; }
        
        /* Hailstorm Night */
        .weather-box.hail-night, body.hail-night { background: linear-gradient(135deg, #000000, #1a1a2e); color: #fff; }
        .weather-box.hail-day::before, .weather-box.hail-night::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(3px 3px at 30% 20%, rgba(255,255,255,0.9), transparent),
                radial-gradient(4px 4px at 70% 60%, rgba(255,255,255,0.9), transparent);
            background-size: 80px 80px; animation: snow-fall 1.5s linear infinite; z-index: 1; pointer-events: none;
        }

        /* Fog Day */
        .weather-box.fog-day, body.fog-day { background: linear-gradient(135deg, #e0e0e0, #ffffff); color: #333; }
        
        /* Fog Night */
        .weather-box.fog-night, body.fog-night { background: linear-gradient(135deg, #232526, #414345); color: #fff; }
        .weather-box.fog-day::before, .weather-box.fog-night::before {
            content: ""; position: absolute; top: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            background-size: 50% 100%; animation: fog-move 10s linear infinite; z-index: 1; pointer-events: none;
        }

        /* Snow Day */
        .weather-box.snow-day, body.snow-day { background: linear-gradient(135deg, #9a9797, #d0cfcf); color: #333; }
        
        /* Snow Night */
        .weather-box.snow-night, body.snow-night { background: linear-gradient(135deg, #232526, #414345); color: #fff; }
        .weather-box.snow-day::before, .weather-box.snow-night::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 50% 50%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2.5px 2.5px at 80% 80%, rgba(255,255,255,0.8), transparent);
            background-size: 150px 150px; animation: snow-fall 5s linear infinite; z-index: 1; pointer-events: none;
        }

        /* Result text animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weather-info > * {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .weather-info > *:nth-child(1) { animation-delay: 0.1s; }
        .weather-info > *:nth-child(2) { animation-delay: 0.2s; }
        .weather-info > *:nth-child(3) { animation-delay: 0.3s; }

        .weather-icon-container {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards 0.4s;
        }

        /* Weather icon graphics */
        .weather-icon {
            width: 160px;
            height: 160px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Make night icons (moon) white instead of orange */
        .weather-box.clear-night .weather-icon,
        .weather-box.partly-cloudy-night .weather-icon,
        .weather-box.snow-night .weather-icon {
            filter: grayscale(100%) brightness(1.3) drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        h2 {
            margin-top: 0;
            margin-bottom: 0;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
            margin-bottom: 0;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            padding: 8px 15px;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        button:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
        }

        .result {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            text-align: left;
            width: 100%;
        }

        .temp-main {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
        }

        .condition-main {
            font-size: 1.2rem;
            text-transform: capitalize;
            margin-bottom: 0;
            font-weight: 500;
        }

        .city-main {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .time-main {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        /* Glass Tabs Grid */
        .details-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards 0.5s;
        }

        .glass-tab {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 5px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1 1 calc(50% - 5px);
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        
        .glass-tab:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.1));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .glass-tab.full-width {
            flex: 1 1 100%;
            flex-direction: column;
            justify-content: center;
            padding: 15px 10px;
        }

        .glass-tab.one-third {
            flex: 1 1 calc(33.333% - 7px);
        }

        .tab-label {
            font-size: 0.85rem;
            opacity: 0.7;
            letter-spacing: 0;
            margin-bottom: 8px;
        }

        .tab-label i {
            margin-right: 5px;
            font-size: 1rem;
            vertical-align: text-bottom;
        }

        .tab-value {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
        }

        #current-time {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 0.7rem;
        }

        /* Hourly forecast */
        .hourly-container {
            max-height: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            margin-top: 0;
            padding: 0;
            /* Collapse smoothly: fade out fast, shrink smoothly */
            transition: max-height 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), max-width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.2s ease-out, padding 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .hourly-container.show {
            max-height: 140px;
            max-width: 350px;
            opacity: 1;
            padding: 10px;
            /* Expand smoothly: fade in slightly delayed, expand smoothly */
            transition: max-height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), max-width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-in 0.2s, padding 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .hourly-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 5px;
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 5px;
        }
        .hourly-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .hourly-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
            padding: 10px;
            border-radius: 10px;
            min-width: 70px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .hourly-time {
            font-size: 0.8rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .hourly-icon-img {
            width: 30px;
            height: 30px;
            margin-bottom: 5px;
        }

        .hourly-temp {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .hourly-sub {
            font-size: 0.6rem;
            opacity: 0.8;
            margin-top: 2px;
        }

        .hourly-box {
            margin-top: 15px;
            width: fit-content;
            max-width: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            color: white;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .hourly-box:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .hourly-header {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 8px;
            cursor: pointer;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 5px;
        }


        /* Loading Animation */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            width: 100%;
        }

        .loader-bars {
            display: flex;
            gap: 5px;
            height: 40px;
            align-items: flex-end;
        }

        .bar {
            width: 6px;
            height: 10px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.8));
            border-radius: 3px;
            animation: barWave 0.5s infinite alternate;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
        }

        .bar:nth-child(1) { animation-delay: 0.0s; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }
        .bar:nth-child(6) { animation-delay: 0.5s; }

        @keyframes barWave {
            0% { height: 10px; opacity: 0.5; }
            100% { height: 35px; opacity: 1; box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }
        }

        .loader-text {
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            animation: textPulse 1.5s infinite ease-in-out;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Conversation Message Box */
        .message-box {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: #fff;
            font-size: 0.9rem;
            display: none;
            z-index: 10;
            animation: fadeInUp 0.3s ease forwards;
        }

        .message-box::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 20px;
            width: 15px;
            height: 15px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.18);
            border-left: 1px solid rgba(255, 255, 255, 0.18);
            transform: rotate(45deg);
        }

        .input-group {
            flex: 1;
            position: relative;
            display: flex;
        }

        .weather-main-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="weather-box">
    <div class="clouds-container">
        <div class="cloud-wrapper x1"><div class="cloud"></div></div>
        <div class="cloud-wrapper x2"><div class="cloud"></div></div>
        <div class="cloud-wrapper x3"><div class="cloud"></div></div>
        <div class="cloud-wrapper x4"><div class="cloud"></div></div>
        <div class="cloud-wrapper x5"><div class="cloud"></div></div>
    </div>
    <h2>Weather Box <span style="font-size: 0.5rem; font-weight: normal; opacity: 0.7; ">by mnvd</span></h2>
    <p id="current-time"></p>
    <div class="search-container">
        <div class="input-group">
            <input type="text" id="city" placeholder="Enter city">
            <div id="message-box" class="message-box"></div>
        </div>
        <button onclick="getWeather()">Search</button>
    </div>
    <div class="result" id="result"></div>
    <div id="hourly-box" class="hourly-box" style="display: none;">
        <div class="hourly-header" onclick="toggleMore()"><i class='bx bx-time'></i> Hourly</div>
        <div id="hourly-container" class="hourly-container"></div>
    </div>
</div>

<script>
    let timeInterval;
    let weatherInterval;
    document.getElementById("city").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            getWeather();
        }
    });

    function toggleMore() {
        const container = document.getElementById('hourly-container');
            container.classList.toggle('show');
    }

    function showMessage(message) {
        const msgBox = document.getElementById('message-box');
        msgBox.innerText = message;
        msgBox.style.display = 'block';
    }

    function startClock(timezoneOffset) {
        if (timeInterval) clearInterval(timeInterval);

        const update = () => {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const cityTime = new Date(utc + (1000 * timezoneOffset));
            
            const day = cityTime.getDate();
            const month = cityTime.toLocaleString('default', { month: 'short' });
            let hours = cityTime.getHours();
            const minutes = cityTime.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            const timeString = `${day} ${month} ${hours.toString().padStart(2, '0')}:${minutes} ${ampm}`;
            const timeEl = document.getElementById("city-time");
            if (timeEl) timeEl.innerText = timeString;
        };
        update();
        timeInterval = setInterval(update, 1000);
    }

    async function getWeather(isAutoUpdate = false) {
        const cityInput = document.getElementById("city").value.trim();
        const city = cityInput.toLowerCase();
        const result = document.getElementById("result");
        const hourlyBox = document.getElementById("hourly-box");
        const hourlyContainer = document.getElementById("hourly-container");
        const messageBox = document.getElementById("message-box");
        
        // Temporary code for testing animations
        const testAnimations = {
            "sunny": { class: "clear-day", icon: "day", condition: "Clear Sky" },
            "clear night": { class: "clear-night", icon: "night", condition: "Clear Sky" },
            "cloudy day": { class: "partly-cloudy-day", icon: "cloudy-day-1", condition: "Partly Cloudy" },
            "cloudy night": { class: "partly-cloudy-night", icon: "cloudy-night-1", condition: "Partly Cloudy" },
            "overcast day": { class: "cloudy-day", icon: "cloudy", condition: "Overcast" },
            "overcast night": { class: "cloudy-night", icon: "cloudy", condition: "Overcast" },
            "rain day": { class: "rain-day", icon: "rainy-6", condition: "Rain" },
            "rain night": { class: "rain-night", icon: "rainy-6", condition: "Rain" },
            "drizzle day": { class: "drizzle-day", icon: "rainy-1", condition: "Drizzle" },
            "drizzle night": { class: "drizzle-night", icon: "rainy-1", condition: "Drizzle" },
            "thunder day": { class: "thunderstorm-day", icon: "thunder", condition: "Thunderstorm" },
            "thunder night": { class: "thunderstorm-night", icon: "thunder", condition: "Thunderstorm" },
            "hail day": { class: "hail-day", icon: "snowy-6", condition: "Hail" },
            "hail night": { class: "hail-night", icon: "snowy-6", condition: "Hail" },
            "fog day": { class: "fog-day", icon: "cloudy", condition: "Fog" },
            "fog night": { class: "fog-night", icon: "cloudy", condition: "Fog" },
            "snow day": { class: "snow-day", icon: "snowy-6", condition: "Snow" },
            "snow night": { class: "snow-night", icon: "snowy-6", condition: "Snow" },
        };

        if (testAnimations[city]) {
            const testData = testAnimations[city];
            const weatherBox = document.querySelector('.weather-box');
            
            // Reset UI
            if (weatherInterval) clearTimeout(weatherInterval);
            document.getElementById("current-time").innerText = "";
            if (timeInterval) clearInterval(timeInterval);
            if (hourlyBox) hourlyBox.style.display = "none";
            hourlyContainer.classList.remove('show');
            hourlyContainer.innerHTML = "";
            messageBox.style.display = "none";

            weatherBox.className = 'weather-box'; // Reset classes
            document.body.className = ''; // Reset body classes
            
            weatherBox.classList.add(testData.class);
            document.body.classList.add(testData.class);

            const iconUrl = `https://www.amcharts.com/wp-content/themes/amcharts4/css/img/icons/weather/animated/${testData.icon}.svg`;

            result.innerHTML = `
                <div class="weather-main-display">
                    <div class="weather-info">
                        <div class="city-main">Test City, TC</div>
                        <div class="time-main" id="city-time">12 Jan 12:00 pm</div>
                        <div class="condition-main">${testData.condition}</div>
                        <div class="temp-main">10<span style="font-size: 0.5em; vertical-align: super;">°C</span></div>
                        <div style="font-size: 0.65rem; opacity: 0.8; margin-top: 1px;">Feels like 8°c</div>
                    </div>
                    <div class="weather-icon-container">
                        <img src="${iconUrl}" alt="${testData.condition}" class="weather-icon">
                    </div>
                </div>
                <div class="details-grid">
                    <div class="glass-tab"><span class="tab-label"><i class='bx bx-cloud-rain'></i> Precipitation</span><span class="tab-value">0 mm</span></div>
                    <div class="glass-tab"><span class="tab-label"><i class='bx bx-wind'></i> Wind</span><span class="tab-value">5 km/h</span></div>
                    <div class="glass-tab"><span class="tab-label"><i class='bx bx-droplet'></i> Humidity</span><span class="tab-value">50%</span></div>
                    <div class="glass-tab"><span class="tab-label"><i class='bx bx-sun'></i> UV Index</span><span class="tab-value">3</span></div>
                </div>
            `;
            hourlyBox.style.display = 'none'; // Hide hourly for test
            return; // Stop the function here
        }
        // End of temporary code

        if (!isAutoUpdate) {
            if (weatherInterval) clearTimeout(weatherInterval);
            
            // Reset UI
            document.getElementById("current-time").innerText = "";
            if (timeInterval) clearInterval(timeInterval);
            if (hourlyBox) hourlyBox.style.display = "none";
            hourlyContainer.classList.remove('show');
            hourlyContainer.innerHTML = "";
            messageBox.style.display = "none";

            if (cityInput === "") {
                showMessage("Please enter a city name");
                return;
            }

            result.innerHTML = `
                <div class="loader-container">
                    <div class="loader-bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    <div class="loader-text">LOADING</div>
                </div>
            `;
        } else if (cityInput === "") {
            return;
        }

        // Fetch weather data from the API key
        const apiKey = "";
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${cityInput}&units=metric&appid=${apiKey}`;
        //const url = `/api/weather?city=${city}`;

        try {
            // Fetch current weather
            const response = await fetch(url);

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || errorData.message || "City not found");
            }

            const data = await response.json();
            
            const temp = data.main.temp;
            const condition = data.weather[0].description;
            const cityName = data.name;
            const country = data.sys.country;
            const timezone = data.timezone;
            const iconCode = data.weather[0].icon;
            const humidity = data.main.humidity;
            const wind = data.wind.speed;
            const windDeg = data.wind.deg || 0;
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const windDir = directions[Math.round(windDeg / 22.5) % 16];
            const precip = (data.rain && data.rain['1h']) ? data.rain['1h'] : 0;

            let precipCondition = "No Rain";
            let precipColor = "rgba(255,255,255,0.7)";
            if (precip > 0) {
                if (precip < 2) {
                    precipCondition = "Light Rain";
                    precipColor = "#90caf9"; // Light Blue
                } else if (precip < 10) {
                    precipCondition = "Moderate Rain";
                    precipColor = "#ffb74d"; // Orange
                } else if (precip <= 30) {
                    precipCondition = "Heavy Rain";
                    precipColor = "#ef5350"; // Red
                } else if (precip <= 50) {
                    precipCondition = "Very Heavy Rain";
                    precipColor = "#d32f2f"; // Darker Red
                } else {
                    precipCondition = "Extremely Heavy";
                    precipColor = "#b71c1c"; // Dark Red
                }
            }

            const feelsLike = Math.round(data.main.feels_like);
            const pressureHpa = data.main.pressure;
            const pressure = (pressureHpa / 1013.25).toFixed(2);
            
            let pressColor, pressLabel;
            if (pressureHpa < 1000) { pressColor = "#ff7e00"; pressLabel = "Low"; }
            else if (pressureHpa > 1020) { pressColor = "#ff7e00"; pressLabel = "High"; }
            else { pressColor = "#00e400"; pressLabel = "Normal"; }

            const visibilityVal = data.visibility / 1000;
            const visibility = visibilityVal.toFixed(1);
            let visColor, visLabel;
            if (visibilityVal < 0.05) { visColor = "#731203"; visLabel = "Very Dense Fog"; }
            else if (visibilityVal < 0.2) { visColor = "#c62828"; visLabel = "Dense Fog"; }
            else if (visibilityVal < 0.5) { visColor = "#ef5350"; visLabel = "Moderate Fog"; }
            else if (visibilityVal < 1) { visColor = "#ff9800"; visLabel = "Fog"; }
            else if (visibilityVal < 2) { visColor = "#ffb74d"; visLabel = "Mist"; }
            else if (visibilityVal < 5) { visColor = "#ffd54f"; visLabel = "Haze"; }
            else if (visibilityVal < 10) { visColor = "#dce775"; visLabel = "Moderate"; }
            else if (visibilityVal < 20) { visColor = "#81c784"; visLabel = "Good"; }
            else { visColor = "#00e400"; visLabel = "Excellent"; }

            const lat = data.coord.lat;
            const lon = data.coord.lon;

            // Fetch Air Quality
            const aqResponse = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`);
            const aqData = await aqResponse.json();
            const aqi = aqData.current.us_aqi;

            let aqiColor, aqiLabel, aqiDarkColor;
            if (aqi <= 50) { aqiColor = "#00e400"; aqiLabel = "Good"; aqiDarkColor = "#057d05"; }
            else if (aqi <= 100) { aqiColor = "#ffff00"; aqiLabel = "Moderate"; aqiDarkColor = "#b5b504"; }
            else if (aqi <= 150) { aqiColor = "#ff7e00"; aqiLabel = "Poor"; aqiDarkColor = "#c26406"; }
            else if (aqi <= 200) { aqiColor = "#ff007f"; aqiLabel = "Unhealthy"; aqiDarkColor = "#c20463"; }
            else if (aqi <= 300) { aqiColor = "#8f3f97"; aqiLabel = "Severe"; aqiDarkColor = "#6e026e"; }
            else { aqiColor = "#7e0023"; aqiLabel = "Hazardous"; aqiDarkColor = "#200000"; }

            // Fetch UV, Precip, Hourly
            const uvResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=uv_index_max,precipitation_probability_max&hourly=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,precipitation_probability,dew_point_2m&timezone=auto&forecast_days=2`);
            const uvData = await uvResponse.json();
            const uvIndex = uvData.daily.uv_index_max[0];
            const precipProb = uvData.daily.precipitation_probability_max[0];

            let uvColor, uvLabel;
            if (uvIndex <= 2) { uvColor = "#00e400"; uvLabel = "Low"; }
            else if (uvIndex <= 5) { uvColor = "#ffff00"; uvLabel = "Moderate"; }
            else if (uvIndex <= 7) { uvColor = "#ff7e00"; uvLabel = "High"; }
            else if (uvIndex <= 10) { uvColor = "#ff0000"; uvLabel = "Very High"; }
            else { uvColor = "#54025c"; uvLabel = "Extreme"; }

            let humidityColor, humidityLabel;
            if (humidity < 25) { humidityColor = "#ff0000"; humidityLabel = "Too Dry"; }
            else if (humidity < 30) { humidityColor = "#ff7e00"; humidityLabel = "Dry"; }
            else if (humidity < 60) { humidityColor = "#00e400"; humidityLabel = "Comfortable"; }
            else if (humidity < 70) { humidityColor = "#ff7e00"; humidityLabel = "Humid"; }
            else { humidityColor = "#ff0000"; humidityLabel = "Very Humid"; }

            let windColor, windLabel;
            const windKmh = wind * 3.6;
            if (windKmh < 2) { windColor = "#404ff5"; windLabel = "Calm"; }
            else if (windKmh < 6) { windColor = "#52d3fa"; windLabel = "Light Air"; }
            else if (windKmh < 12) { windColor = "#46eefa"; windLabel = "Light Breeze"; }
            else if (windKmh < 20) { windColor = "#04b518"; windLabel = "Gentle Breeze"; }
            else if (windKmh < 29) { windColor = "#02f71f"; windLabel = "Moderate Breeze"; }
            else if (windKmh < 39) { windColor = "#b4fa1e"; windLabel = "Fresh Breeze"; }
            else if (windKmh < 50) { windColor = "#a0f73b"; windLabel = "Strong Breeze"; }
            else if (windKmh < 62) { windColor = "#e7f54e"; windLabel = "High Wind"; }
            else if (windKmh < 75) { windColor = "#e8a143"; windLabel = "Gale"; }
            else if (windKmh < 89) { windColor = "#fa8f02"; windLabel = "Strong Gale"; }
            else if (windKmh < 103) { windColor = "#eb543d"; windLabel = "Storm"; }
            else if (windKmh < 118) { windColor = "#f02a0c"; windLabel = "Violent Storm"; }
            else { windColor = "#731203"; windLabel = "Hurricane"; }

            // Set weather class and icon based on weather condition
            const wId = data.weather[0].id;
            const isNight = iconCode.includes('n');
            
            let weatherClass = '';
            let amIcon = '';

            if (wId >= 200 && wId < 300) {
                weatherClass = isNight ? 'thunderstorm-night' : 'thunderstorm-day';
                amIcon = 'thunder';
            } else if (wId >= 300 && wId < 400) {
                weatherClass = isNight ? 'drizzle-night' : 'drizzle-day';
                amIcon = 'rainy-1';
            } else if (wId >= 500 && wId < 600) {
                if (wId === 511) {
                    weatherClass = isNight ? 'hail-night' : 'hail-day';
                    amIcon = 'snowy-6';
                } else {
                    weatherClass = isNight ? 'rain-night' : 'rain-day';
                    amIcon = 'rainy-6';
                }
            } else if (wId >= 600 && wId < 700) {
                if (wId === 611 || wId === 615 || wId === 616 || wId === 621 || wId === 622) {
                    weatherClass = isNight ? 'hail-night' : 'hail-day';
                    amIcon = 'snowy-6';
                } else {
                    weatherClass = isNight ? 'snow-night' : 'snow-day';
                    amIcon = 'snowy-6';
                }
            } else if (wId >= 700 && wId < 800) {
                weatherClass = isNight ? 'fog-night' : 'fog-day';
                amIcon = 'cloudy';
            } else if (wId === 800) {
                weatherClass = isNight ? 'clear-night' : 'clear-day';
                amIcon = isNight ? 'night' : 'day';
            } else if (wId === 801 || wId === 802) {
                weatherClass = isNight ? 'partly-cloudy-night' : 'partly-cloudy-day';
                amIcon = isNight ? 'cloudy-night-1' : 'cloudy-day-1';
            } else if (wId === 803 || wId === 804) {
                weatherClass = isNight ? 'cloudy-night' : 'cloudy-day';
                amIcon = 'cloudy';
            } else {
                weatherClass = isNight ? 'clear-night' : 'clear-day';
                amIcon = isNight ? 'night' : 'day';
            }

            const iconUrl = `https://www.amcharts.com/wp-content/themes/amcharts4/css/img/icons/weather/animated/${amIcon}.svg`;

            // Update UI Background
            const weatherBox = document.querySelector('.weather-box');
            
            weatherBox.className = 'weather-box'; // Reset classes
            document.body.className = ''; // Reset body classes
            
            weatherBox.classList.add(weatherClass);
            document.body.classList.add(weatherClass);

            if (precip <= 0.5) {
                weatherBox.classList.add('no-rain');
            }

            // Calculate Dew Point from hourly data (current hour)
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const cityTime = new Date(utc + (1000 * timezone));
            const currentHour = cityTime.getHours();
            
            // Fallback if hourly data isn't perfectly aligned or available, though usually it is with timezone=auto
            const dewPoint = uvData.hourly.dew_point_2m[currentHour] !== undefined ? Math.round(uvData.hourly.dew_point_2m[currentHour]) : "N/A";

            let dewColor, dewLabel;
            if (typeof dewPoint === 'number') {
                 if (dewPoint < 10) { dewColor = "#66f2ae"; dewLabel = "Dry"; }
                 else if (dewPoint < 15) { dewColor = "#00e400"; dewLabel = "Comfortable"; }
                 else if (dewPoint < 18) { dewColor = "#ffff00"; dewLabel = "Noticeable"; }
                 else if (dewPoint < 21) { dewColor = "#ff7e00"; dewLabel = "Uncomfortable"; }
                 else if (dewPoint < 24) { dewColor = "#ff0000"; dewLabel = "Very Humid"; }
                 else { dewColor = "#731203"; dewLabel = "Extreme Humid"; }
            } else {
                 dewColor = "#fff"; dewLabel = "-";
            }

            // Render Main Result
            result.innerHTML = `
                <div class="weather-main-display">
                    <div class="weather-info">
                        <div class="city-main">${cityName}, ${country}</div>
                        <div class="time-main" id="city-time">Loading...</div>
                        <div class="condition-main">${condition}</div>
                        <div class="temp-main">${Math.round(temp)}<span style="font-size: 0.5em; vertical-align: super;">°C</span></div>
                        <div style="font-size: 0.65rem; opacity: 0.8; margin-top: 1px;">Feels like ${feelsLike}°c</div>
                    </div>
                    <div class="weather-icon-container">
                        <img src="${iconUrl}" onerror="this.src='https://openweathermap.org/img/wn/${iconCode}@4x.png'" alt="${condition}" class="weather-icon">
                    </div>
                </div>
                
                <div class="details-grid">
                    <!-- Precipitation -->
                    <div class="glass-tab" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-cloud-rain'></i> Precipitation</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${precip} mm</span>
                                <span style="font-size: 0.65rem; color: ${precipColor}; font-weight: bold;">${precipCondition}</span>
                            </div>
                            <div style="display: flex; flex-direction: column; align-items: center;">
                                <span class="tab-value">${precipProb}%</span>
                                <span style="font-size: 0.45rem; font-weight: normal; opacity: 0.8;">Probability</span>
                            </div>
                        </div>
                    </div>
                    <!-- Wind -->
                    <div class="glass-tab" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-wind'></i> Wind</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${Math.round(wind * 3.6)} km/h</span>
                                <span style="font-size: 0.65rem; color: ${windColor}; font-weight: bold;">${windLabel}</span>
                            </div>
                            <div style="display: flex; flex-direction: column; align-items: center; position: relative; top: -10px;">
                                <span style="font-size: 1rem; font-weight: bold;">${windDir}</span>
                                <i class='bx bx-navigation' style="transform: rotate(${windDeg - 45}deg); font-size: 1rem; margin-top: 2px;"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Humidity, Feels Like, UV (Row of 3) -->
                    <div class="glass-tab" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-droplet'></i> Humidity</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${humidity}%</span>
                                <span style="font-size: 0.65rem; color: ${humidityColor}; font-weight: bold;">${humidityLabel}</span>
                            </div>
                        </div>
                    </div>
                    <div class="glass-tab" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-sun'></i> UV Index</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${uvIndex}</span>
                                <span style="font-size: 0.65rem; color: ${uvColor}; font-weight: bold;">${uvLabel}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Visibility, Pressure, Dew Point (Row of 3) -->
                    <div class="glass-tab one-third" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-show'></i> Visibility</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${visibility} km</span>
                                <span style="font-size: 0.65rem; color: ${visColor}; font-weight: bold;">${visLabel}</span>
                            </div>
                        </div>
                    </div>
                    <div class="glass-tab one-third" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-tachometer'></i> Pressure</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${pressure} atm</span>
                                <span style="font-size: 0.65rem; color: ${pressColor}; font-weight: bold;">${pressLabel}</span>
                            </div>
                        </div>
                    </div>
                    <div class="glass-tab one-third" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;"><i class='bx bx-water'></i> Dew Point</span>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; flex-direction: column; margin-left: 21px;">
                                <span class="tab-value">${dewPoint}°</span>
                                <span style="font-size: 0.65rem; color: ${dewColor}; font-weight: bold;">${dewLabel}</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- AQI (Long) -->
                    <div class="glass-tab full-width" style="justify-content: flex-start; text-align: left; padding-top: 5px;">
                        <div style="display: flex; align-items: center; margin-bottom: 7px;">
                            <span class="tab-label" style="font-size: 0.65rem; font-weight: bold; margin-bottom: 0;"><i class='bx bx-leaf'></i> Air Quality</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <div style="display: flex; flex-direction: column; align-items: center; margin-left: 21px; margin-right: 15px; min-width: 50px;">
                                <span class="tab-value">${aqi}</span>
                                <span style="font-size: 0.65rem; font-weight: bold; color: ${aqiColor}; margin-top: 2px; text-align: center;">${aqiLabel}</span>
                            </div>
                            <div style="flex: 1; position: relative; margin-right: 5px;">
                                <div style="position: relative; height: 10px; font-size: 0.5rem; opacity: 0.7;">
                                    <span style="position: absolute; left: 0%;">0</span>
                                    <span style="position: absolute; left: 10%; transform: translateX(-50%);">50</span>
                                    <span style="position: absolute; left: 20%; transform: translateX(-50%);">100</span>
                                    <span style="position: absolute; left: 30%; transform: translateX(-50%);">150</span>
                                    <span style="position: absolute; left: 40%; transform: translateX(-50%);">200</span>
                                    <span style="position: absolute; left: 60%; transform: translateX(-50%);">300</span>
                                    <span style="position: absolute; left: 100%; transform: translateX(-100%);">500</span>
                                </div>
                                <div style="height: 8px; border-radius: 4px; background: linear-gradient(to right, #00e400 0%, #ffff00 10%, #ff7e00 20%, #ff007f 30%, #8f3f97 40%, #7e0023 60%, #7e0023 100%); position: relative; margin: 2px 0;">
                                    <div style="position: absolute; left: ${Math.min((aqi / 500) * 100, 100)}%; top: -2px; width: 2px; height: 12px; background: ${aqiDarkColor}; border-radius: 2px; transform: translateX(-50%);"></div>
                                </div>
                                <div style="position: relative; height: 10px; font-size: 0.5rem; opacity: 0.7;">
                                    <span style="position: absolute; left: 0%; font-weight: bold;">Good</span>
                                    <span style="position: absolute; left: 40%; transform: translateX(-50%); font-weight: bold;">Unhealthy</span>
                                    <span style="position: absolute; left: 100%; transform: translateX(-100%); font-weight: bold;">Hazardous</span>
                                </div>
                            </div>
                        </div>
                    </div>
            `;
            
            startClock(timezone);

            // Process Hourly Data
            let hourlyHTML = '<div class="hourly-scroll">';
            
            const wmoIconMap = {
                0: "day", 1: "day", 2: "cloudy-day-1", 3: "cloudy",
                45: "cloudy", 48: "cloudy",
                51: "rainy-1", 53: "rainy-1", 55: "rainy-1",
                56: "rainy-1", 57: "rainy-1",
                61: "rainy-6", 63: "rainy-6", 65: "rainy-6",
                66: "rainy-6", 67: "rainy-6",
                71: "snowy-6", 73: "snowy-6", 75: "snowy-6",
                77: "snowy-6",
                80: "rainy-6", 81: "rainy-6", 82: "rainy-6",
                85: "snowy-6", 86: "snowy-6",
                95: "thunder", 96: "thunder", 99: "thunder"
            };

            for (let i = currentHour + 1; i <= currentHour + 12; i++) {
                if (i >= uvData.hourly.time.length) break;
                
                const timeStr = uvData.hourly.time[i];
                const dateObj = new Date(timeStr);
                let h = dateObj.getHours();
                const ampm = h >= 12 ? 'pm' : 'am';
                h = h % 12;
                h = h ? h : 12;
                const displayTime = `${h} ${ampm}`;
                
                const hTemp = Math.round(uvData.hourly.temperature_2m[i]);
                const hPop = uvData.hourly.precipitation_probability[i];
                const hCode = uvData.hourly.weather_code[i];
                const hIcon = wmoIconMap[hCode] || "day";
                const hIconSrc = `https://www.amcharts.com/wp-content/themes/amcharts4/css/img/icons/weather/animated/${hIcon}.svg`;

                hourlyHTML += `<div class="hourly-card"><div class="hourly-time">${displayTime}</div><img src="${hIconSrc}" class="hourly-icon-img"><div class="hourly-temp">${hTemp}°</div><div class="hourly-sub">💧 ${hPop}%</div></div>`;
            }
            hourlyHTML += '</div>';
            hourlyContainer.innerHTML = hourlyHTML;
            hourlyBox.style.display = 'flex';

            if (weatherInterval) clearTimeout(weatherInterval);
            weatherInterval = setTimeout(() => getWeather(true), 300000); // 5 minutes

        } catch (error) {
            if (!isAutoUpdate) {
                result.innerHTML = "";
                showMessage(error.message);
            }
        }
    }
</script>

</body>
</html>
